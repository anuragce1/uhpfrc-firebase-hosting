<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UHPFRC DATABASE REGISTER</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB-1PNQJ-dif1RM2dq8f1_CyGM12Q1A6lo",
            authDomain: "uhpfrc-concrete-register.firebaseapp.com",
            projectId: "uhpfrc-concrete-register",
            storageBucket: "uhpfrc-concrete-register.firebasestorage.app",
            messagingSenderId: "860418939906",
            appId: "1:860418939906:web:a459590118c0283a309b1b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.saveToCloud = saveToCloud;
        window.saveTestData = saveTestData;
        window.calculateDates = calculateDates;
        window.toggleCustomInput = toggleCustomInput;
        window.downloadCSV = downloadCSV;
        window.filterSamplesByAuthority = filterSamplesByAuthority; 
        window.toggleDateSort = toggleDateSort;

        let targets = {};
        let localDataCopy = [];
        let allFirebaseDocs = []; 
        let dateSortDirection = 'desc';

        const q = query(collection(db, "uhpfrc_records"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            allFirebaseDocs = [];
            snapshot.forEach(doc => {
                allFirebaseDocs.push({ id: doc.id, data: doc.data() });
            });
            
            refreshTableUI();
            renderSummaryTable();
            filterSamplesByAuthority(); 
        }, (error) => {
            console.error("Database connection failed: ", error);
        });

        function toggleCustomInput(selectId, customInputId) {
            const selectEl = document.getElementById(selectId);
            const customInput = document.getElementById(customInputId);
            if (selectEl.value === "Others") {
                customInput.style.display = "block";
            } else {
                customInput.style.display = "none";
            }
            if (selectId === 'testAuthority') filterSamplesByAuthority();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('testAuthCustom').addEventListener('input', filterSamplesByAuthority);
            document.getElementById('testAge').addEventListener('change', filterSamplesByAuthority);
        });

        function filterSamplesByAuthority() {
            const select = document.getElementById("testSpecimenSelect");
            const currentSelection = select.value;
            let selectedTestingAuthority = document.getElementById("testAuthority").value;
            if (selectedTestingAuthority === "Others") {
                selectedTestingAuthority = document.getElementById("testAuthCustom").value.trim();
            }

            select.innerHTML = '<option value="">-- Choose Active Sample --</option>';
            const filteredDocs = allFirebaseDocs.filter(item => {
                const matchAuth = item.data.authority === selectedTestingAuthority;
                const isManuallyDestroyed = item.data.isDestroyed === true;
                const ageKeys = ['3d', '7d', '14d', '28d', '56d', '90d'];
                const hasAnyPriorTestData = ageKeys.some(age => {
                    return (item.data["strength" + age] && item.data["strength" + age].toString().trim() !== "") ||
                           (item.data["flexure" + age] && item.data["flexure" + age].toString().trim() !== "");
                });
                return matchAuth && !isManuallyDestroyed && !hasAnyPriorTestData;
            });

            filteredDocs.forEach(item => {
                const option = document.createElement("option");
                option.value = item.id;
                option.textContent = `${item.data.specimenId} (${item.data.concreteType})`;
                select.appendChild(option);
            });
            select.value = currentSelection;
        }

        function renderSummaryTable() {
            const summaryHeaderRow1 = document.getElementById("summaryHeaderRow1");
            const summaryHeaderRow2 = document.getElementById("summaryHeaderRow2");
            const summaryBody = document.getElementById("summaryBody");

            const standardAuthorities = ["RDSO", "MoRTH", "Others"];
            const ageKeys = ['3d', '7d', '14d', '28d', '56d', '90d'];

            summaryHeaderRow1.innerHTML = `
                <th style="border: 2px solid #000; text-align: center; font-weight: bold; width: 60px;"></th>
                <th style="border: 2px solid #000; text-align: center; font-weight: bold; min-width: 180px;">Authority Type</th>
                <th colspan="3" style="border: 2px solid #000; text-align: center; font-weight: bold; background: #fafafa;">RDSO</th>
                <th colspan="3" style="border: 2px solid #000; text-align: center; font-weight: bold; background: #fafafa;">MoRTH</th>
                <th colspan="3" style="border: 2px solid #000; text-align: center; font-weight: bold; background: #fafafa;">OTHERS</th>
            `;

            summaryHeaderRow2.innerHTML = `
                <th style="border: 2px solid #000; text-align: center; font-weight: bold;">S.No.</th>
                <th style="border: 2px solid #000;"></th>
                <th style="border: 2px solid #000; text-align: center; font-weight: 500;">Casted</th>
                <th style="border: 2px solid #000; text-align: center; font-weight: 500;">Tested</th>
                <th style="border: 2px solid #000; text-align: center; font-weight: 500;">Left</th>
                <th style="border: 2px solid #000; text-align: center; font-weight: 500;">Casted</th>
                <th style="border: 2px solid #000; text-align: center; font-weight: 500;">Tested</th>
                <th style="border: 2px solid #000; text-align: center; font-weight: 500;">Left</th>
                <th style="border: 2px solid #000; text-align: center; font-weight: 500;">Casted</th>
                <th style="border: 2px solid #000; text-align: center; font-weight: 500;">Tested</th>
                <th style="border: 2px solid #000; text-align: center; font-weight: 500;">Left</th>
            `;

            const definedTypes = ["Beam 100X100X500", "Cube", "Cyl", ""];
            summaryBody.innerHTML = "";

            definedTypes.forEach((specimenType, index) => {
                let rowHtml = `
                    <td style="border: 2px solid #000; text-align: center; font-weight: bold;">${index + 1}</td>
                    <td style="border: 2px solid #000; font-weight: 500; padding-left: 10px;">${specimenType || 'Custom Entries & Others'}</td>
                `;

                standardAuthorities.forEach(authGroup => {
                    let castedCount = 0;
                    let testedCount = 0;
                    let leftCount = 0;

                    allFirebaseDocs.forEach(item => {
                        const currentItemType = (item.data.type || "").trim();
                        if (specimenType !== "" && currentItemType !== specimenType) return;
                        if (specimenType === "" && (currentItemType === "Beam 100X100X500" || currentItemType === "Cube" || currentItemType === "Cyl")) {
                            return;
                        }

                        let currentItemAuth = (item.data.authority || "").trim();
                        if (authGroup === "Others" && currentItemAuth !== "RDSO" && currentItemAuth !== "MoRTH") {
                            // Match custom variants
                        } else if (currentItemAuth !== authGroup) {
                            return;
                        }

                        const isManuallyDestroyed = item.data.isDestroyed === true;
                        const hasTestData = ageKeys.some(age => (item.data["strength" + age] && item.data["strength" + age].trim() !== "") || (item.data["flexure" + age] && item.data["flexure" + age].trim() !== ""));

                        castedCount++;
                        if (isManuallyDestroyed || hasTestData) testedCount++;
                        else leftCount++;
                    });

                    rowHtml += `
                        <td style="border: 2px solid #000; text-align: center;">${castedCount || '-'}</td>
                        <td style="border: 2px solid #000; text-align: center;">${testedCount || '-'}</td>
                        <td style="border: 2px solid #000; text-align: center; font-weight: bold; background: #fffdf5;">${leftCount || '-'}</td>
                    `;
                });

                const tr = document.createElement("tr");
                tr.innerHTML = rowHtml;
                summaryBody.appendChild(tr);
            });
        }

        function calculateDates() {
            const castVal = document.getElementById('castingDate').value;
            if (!castVal) return;
            const cDate = new Date(castVal);
            [3, 7, 14, 28, 56, 90].forEach(days => {
                let tDate = new Date(cDate);
                tDate.setDate(cDate.getDate() + days);
                targets[days + 'd'] = tDate.toISOString().split('T')[0];
            });
        }

        async function saveToCloud() {
            const specimenId = document.getElementById("specimenId").value.trim();
            const castingDate = document.getElementById("castingDate").value;
            if(!specimenId || !castingDate) return alert("Error: Specimen ID and Casting Date are mandatory!");

            let authority = document.getElementById("castAuthority").value;
            if (authority === "Others") authority = document.getElementById("castAuthCustom").value.trim() || "Custom Spec";

            let specType = document.getElementById("specimenType").value;
            if (specType === "Others") specType = document.getElementById("specimenTypeCustom").value.trim() || "Custom Size";

            let concreteMat = document.getElementById("concreteType").value;
            if (concreteMat === "Others") concreteMat = document.getElementById("concreteTypeCustom").value.trim() || "Custom Concrete";

            try {
                await addDoc(collection(db, "uhpfrc_records"), {
                    specimenId, authority, type: specType, concreteType: concreteMat, castingDate, isDestroyed: false, 
                    target3d: targets['3d'] || "", target7d: targets['7d'] || "", target14d: targets['14d'] || "", target28d: targets['28d'] || "", target56d: targets['56d'] || "", target90d: targets['90d'] || "",
                    strength3d: "", strength7d: "", strength14d: "", strength28d: "", strength56d: "", strength90d: "",
                    flexure3d: "", flexure7d: "", flexure14d: "", flexure28d: "", flexure56d: "", flexure90d: "",
                    flexureConfig3d: "", flexureConfig7d: "", flexureConfig14d: "", flexureConfig28d: "", flexureConfig56d: "", flexureConfig90d: "",
                    timestamp: serverTimestamp()
                });
                alert("Casting successfully logged!");
                ["specimenId","castingDate","castAuthCustom","specimenTypeCustom","concreteTypeCustom"].forEach(id=>document.getElementById(id).value="");
            } catch (err) { alert("Write failed: " + err.message); }
        }

        async function saveTestData() {
            const docId = document.getElementById("testSpecimenSelect").value;
            const age = document.getElementById("testAge").value;
            const compVal = document.getElementById("testStrengthResult").value.trim();
            const flexVal = document.getElementById("testFlexureResult").value.trim();
            const flexConfig = document.getElementById("flexureConfig").value;
            const testingDate = document.getElementById("testingDate").value;
            const setDestroyed = document.getElementById("isDestroyedCheck").checked;

            if(!docId) return alert("Select a Target Specimen!");
            const updatePayload = {};
            if (compVal) updatePayload["strength" + age] = compVal;
            if (flexVal) updatePayload["flexure" + age] = flexVal;
            if (flexConfig !== "None") updatePayload["flexureConfig" + age] = flexConfig;
            
            // CRITICAL STEP: Store testing execution date strictly down into Firebase
            if (testingDate) {
                updatePayload["testDate" + age] = testingDate;
            } else {
                updatePayload["testDate" + age] = new Date().toISOString().split('T')[0];
            }
            
            if (setDestroyed || compVal || flexVal) updatePayload["isDestroyed"] = true;

            try {
                const docRef = doc(db, "uhpfrc_records", docId);
                await updateDoc(docRef, updatePayload);
                alert("Test metrics registered successfully!");
                document.getElementById("testStrengthResult").value = "";
                document.getElementById("testFlexureResult").value = "";
                document.getElementById("testingDate").value = "";
            } catch (err) { alert("Update failed: " + err.message); }
        }

        function getCombinedCellContent(targetDate, compVal, flexVal, flexConfig) {
            if (!targetDate) return `<td>--</td>`;
            if((compVal && compVal.trim() !== "") || (flexVal && flexVal.trim() !== "")) {
                let txt = `<span class="status done">✓ Logged</span>`;
                if(compVal) txt += `<br><span style="margin-top:2px; display:inline-block;"><strong>C:</strong> ${compVal} MPa</span>`;
                return `<td><strong>${targetDate}</strong><br>${txt}</td>`;
            }
            return `<td><strong>${targetDate}</strong><br><span class="status pending">Waiting</span></td>`;
        }

        function toggleDateSort() {
            dateSortDirection = (dateSortDirection === 'desc') ? 'asc' : 'desc';
            document.getElementById("sortIndicator").innerHTML = dateSortDirection === 'desc' ? " ⬇️" : " ⬆️";
            refreshTableUI();
        }

        function refreshTableUI() {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";
            const sortedDocs = [...allFirebaseDocs].sort((a,b) => {
                return dateSortDirection === 'desc' ? (b.data.castingDate || "").localeCompare(a.data.castingDate || "") : (a.data.castingDate || "").localeCompare(b.data.castingDate || "");
            });

            sortedDocs.forEach(item => {
                const data = item.data;
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td><strong>${data.specimenId}</strong><br><small style="color:#6366f1">Spec: ${data.authority}</small></td>
                    <td>${data.type}<br><strong>${data.concreteType}</strong></td>
                    <td style="font-weight:600;">${data.castingDate}</td>
                    ${getCombinedCellContent(data.target3d, data.strength3d, data.flexure3d, data.flexureConfig3d)}
                    ${getCombinedCellContent(data.target7d, data.strength7d, data.flexure7d, data.flexureConfig7d)}
                    ${getCombinedCellContent(data.target14d, data.strength14d, data.flexure14d, data.flexureConfig14d)}
                    ${getCombinedCellContent(data.target28d, data.strength28d, data.flexure28d, data.flexureConfig28d)}
                    ${getCombinedCellContent(data.target56d, data.strength56d, data.flexure56d, data.flexureConfig56d)}
                    ${getCombinedCellContent(data.target90d, data.strength90d, data.flexure90d, data.flexureConfig90d)}
                `;
                tbody.appendChild(row);
            });
            if(sortedDocs.length === 0) tbody.innerHTML = "<tr><td colspan='9' style='text-align:center; padding:20px;'>No logs available.</td></tr>";
        }

        // 📊 FIXED EXCEL/CSV EXPORTER WITH TARGETED RUNTIME EXTRACTIONS
        function downloadCSV() {
            if(allFirebaseDocs.length === 0) return alert("No records available to export.");
            
            let csv = "Specimen ID,Status,Authority,Size/Type,Concrete Base,Casting Date," +
                      "3D Test Date,3D Comp (MPa),3D Max Load,3D Flex Method," +
                      "7D Test Date,7D Comp (MPa),7D Max Load,7D Flex Method," +
                      "14D Test Date,14D Comp (MPa),14D Max Load,14D Flex Method," +
                      "28D Test Date,28D Comp (MPa),28D Max Load,28D Flex Method," +
                      "56D Test Date,56D Comp (MPa),56D Flex Method," +
                      "90D Test Date,90D Comp (MPa),90D Flex Method\n";
            
            allFirebaseDocs.forEach(item => {
                const r = item.data;
                const ageKeys = ['3d', '7d', '14d', '28d', '56d', '90d'];
                const autoDestroyed = ageKeys.some(age => (r["strength" + age] && r["strength" + age].trim() !== "") || (r["flexure" + age] && r["flexure" + age].trim() !== ""));
                let statusTxt = (r.isDestroyed || autoDestroyed) ? "Closed/Destroyed" : "Active/Pending";
                
                // Safe string parsing wrapper to prevent formatting breakage
                const getVal = (val) => { return val ? val.toString().replace(/"/g, '""').trim() : "-"; };

                csv += `"${getVal(r.specimenId)}","${statusTxt}","${getVal(r.authority)}","${getVal(r.type)}","${getVal(r.concreteType)}","${getVal(r.castingDate)}",` +
                       `"${getVal(r.testDate3d)}","${getVal(r.strength3d)}","${getVal(r.flexure3d)}","${getVal(r.flexureConfig3d)}",` +
                       `"${getVal(r.testDate7d)}","${getVal(r.strength7d)}","${getVal(r.flexure7d)}","${getVal(r.flexureConfig7d)}",` +
                       `"${getVal(r.testDate14d)}","${getVal(r.strength14d)}","${getVal(r.flexure14d)}","${getVal(r.flexureConfig14d)}",` +
                       `"${getVal(r.testDate28d)}","${getVal(r.strength28d)}","${getVal(r.flexure28d)}","${getVal(r.flexureConfig28d)}",` +
                       `"${getVal(r.testDate56d)}","${getVal(r.strength56d)}","${getVal(r.flexureConfig56d)}",` +
                       `"${getVal(r.testDate90d)}","${getVal(r.strength90d)}","${getVal(r.flexureConfig90d)}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `UHPFRC_Database_Export.csv`;
            link.click();
        }
    </script>
    <style>
        :root { --primary: #1e293b; --secondary: #0f766e; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1700px; margin: 0 auto; }
        header { background: var(--primary); color: white; padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 1200px) { .grid { grid-template-columns: 420px 1fr; } }
        .card { background: white; padding: 22px; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 13px; color: #475569; }
        input, select { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .btn { background: var(--secondary); color: white; padding: 10px; border: none; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-download { background: #334155; width: auto; padding: 8px 15px; font-size: 13px; }
        .table-responsive { overflow-x: auto; max-height: 600px; border-radius: 8px; border: 1px solid #cbd5e1; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; background: #fff; }
        th, td { padding: 10px 12px; text-align: left; border: 1px solid #cbd5e1; }
        th { background: #f8fafc; color: #334155; font-weight: 700; }
        .status { padding: 2px 4px; border-radius: 3px; font-size: 10px; font-weight: bold; }
        .done { background: #dcfce7; color: #059669; }
        .pending { background: #f1f5f9; color: #475569; }
        .sortable { cursor: pointer; background: #e2e8f0 !important; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1 style="margin:0; font-size:20px;">🚧 UHPFRC Master Database Dashboard</h1>
        <button class="btn btn-download" onclick="window.downloadCSV()">⬇️ Export Master Sheet (Excel/CSV)</button>
    </header>

    <div class="card">
        <h3 style="margin-top:0; color:var(--primary); font-size:15px; margin-bottom:12px;">📈 LIVE SPECIMEN QUANTITY SUMMARY MATRIX</h3>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr id="summaryHeaderRow1"></tr>
                    <tr id="summaryHeaderRow2"></tr>
                </thead>
                <tbody id="summaryBody"></tbody>
            </table>
        </div>
    </div>

    <div class="grid">
        <div class="forms">
            <div class="card">
                <h3>📝 Log Casting</h3>
                <div class="form-group"><label>Casting Date</label><input type="date" id="castingDate" onchange="calculateDates()"></div>
                <div class="form-group">
                    <label>Authority</label>
                    <select id="castAuthority" onchange="toggleCustomInput('castAuthority', 'castAuthCustom')">
                        <option value="RDSO">RDSO</option>
                        <option value="MoRTH">MoRTH</option>
                        <option value="Others">Others</option>
                    </select>
                    <input type="text" id="castAuthCustom" style="display:none; margin-top:5px;" placeholder="Custom Authority">
                </div>
                <div class="form-group"><label>Specimen ID</label><input type="text" id="specimenId" placeholder="e.g. UHP-001"></div>
                <div class="form-group">
                    <label>Specimen Type</label>
                    <select id="specimenType" onchange="toggleCustomInput('specimenType', 'specimenTypeCustom')">
                        <option value="Beam 100X100X500">Beam 100X100X500</option>
                        <option value="Cube">Cube</option>
                        <option value="Cyl">Cyl</option>
                        <option value="Others">Others</option>
                    </select>
                    <input type="text" id="specimenTypeCustom" style="display:none; margin-top:5px;" placeholder="Custom Shape">
                </div>
                <div class="form-group">
                    <label>Concrete Mix Base</label>
                    <select id="concreteType"><option value="UHPFRC">UHPFRC</option></select>
                </div>
                <button class="btn" onclick="saveToCloud()">Save Casting</button>
            </div>

            <div class="card">
                <h3>🧪 Log Testing Metrics</h3>
                <div class="form-group"><label>Testing Execution Date</label><input type="date" id="testingDate"></div>
                <div class="form-group">
                    <label>Authority</label>
                    <select id="testAuthority" onchange="toggleCustomInput('testAuthority', 'testAuthCustom')">
                        <option value="RDSO">RDSO</option>
                        <option value="MoRTH">MoRTH</option>
                        <option value="Others">Others</option>
                    </select>
                    <input type="text" id="testAuthCustom" style="display:none; margin-top:5px;" placeholder="Custom Authority">
                </div>
                <div class="form-group">
                    <label>Age Key</label>
                    <select id="testAge">
                        <option value="3d">3-Day</option>
                        <option value="7d">7-Day</option>
                        <option value="14d">14-Day</option>
                        <option value="28d">28-Day</option>
                        <option value="56d">56-Day</option>
                        <option value="90d">90-Day</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Target ID</label>
                    <select id="testSpecimenSelect"><option value="">-- Choose Active Sample --</option></select>
                </div>
                <div class="form-group"><label>Compressive Strength (MPa)</label><input type="number" step="0.01" id="testStrengthResult"></div>
                <div class="form-group"><label>Max Load Result</label><input type="number" step="0.01" id="testFlexureResult"></div>
                <div class="form-group">
                    <label>Flexure Config</label>
                    <select id="flexureConfig">
                        <option value="None">None</option>
                        <option value="3PBT">3PBT</option>
                        <option value="4PBT">4PBT</option>
                    </select>
                </div>
                <div style="display:none;"><input type="checkbox" id="isDestroyedCheck"></div>
                <button class="btn" style="background:#2563eb;" onclick="saveTestData()">Update Test Data</button>
            </div>
        </div>

        <div class="card">
            <h3>📋 Live Ledger Records</h3>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Specimen</th>
                            <th>Type</th>
                            <th class="sortable" onclick="toggleDateSort()">Cast Date <span id="sortIndicator">⬇️</span></th>
                            <th>3D</th><th>7D</th><th>14D</th><th>28D</th><th>56D</th><th>90D</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
